global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    app: farmer-game

# Alerting rules (add alert files here when ready)
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets: ['alertmanager:9093']

scrape_configs:
  # Prometheus self-monitoring
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  # 农趣村 Go server — exposes /metrics when prom client is wired
  - job_name: farmer-server
    metrics_path: /metrics
    static_configs:
      - targets: ['server:9080']
    scrape_interval: 10s

  # PostgreSQL via postgres_exporter (add if deployed)
  # - job_name: postgres
  #   static_configs:
  #     - targets: ['postgres-exporter:9187']

  # Redis via redis_exporter (add if deployed)
  # - job_name: redis
  #   static_configs:
  #     - targets: ['redis-exporter:9121']
